name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos-arm:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm install
      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target aarch64-apple-darwin
      - name: List bundle output
        run: find src-tauri/target/aarch64-apple-darwin/release/bundle -type f | sort
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/

  build-macos-intel:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm install
      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target x86_64-apple-darwin
      - name: List bundle output
        run: find src-tauri/target/x86_64-apple-darwin/release/bundle -type f | sort
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/

  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm install
      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build
      - name: List bundle output
        run: find src-tauri/target/release/bundle -type f | sort
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: src-tauri/target/release/bundle/

  publish:
    needs: [build-macos-arm, build-macos-intel, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: List all downloaded artifacts
        run: find artifacts -type f | sort

      - name: Collect release files and generate latest.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p release-files

          # macOS ARM
          cp artifacts/macos-arm/dmg/*.dmg release-files/ 2>/dev/null || true
          cp artifacts/macos-arm/macos/*.tar.gz release-files/Tally_aarch64.app.tar.gz 2>/dev/null || true
          cp artifacts/macos-arm/macos/*.tar.gz.sig release-files/Tally_aarch64.app.tar.gz.sig 2>/dev/null || true

          # macOS Intel
          cp artifacts/macos-intel/dmg/*.dmg release-files/ 2>/dev/null || true
          cp artifacts/macos-intel/macos/*.tar.gz release-files/Tally_x64.app.tar.gz 2>/dev/null || true
          cp artifacts/macos-intel/macos/*.tar.gz.sig release-files/Tally_x64.app.tar.gz.sig 2>/dev/null || true

          # Linux
          cp artifacts/linux/deb/*.deb release-files/ 2>/dev/null || true
          cp artifacts/linux/rpm/*.rpm release-files/ 2>/dev/null || true
          cp artifacts/linux/appimage/*.AppImage release-files/ 2>/dev/null || true
          cp artifacts/linux/appimage/*.AppImage.sig release-files/ 2>/dev/null || true

          echo "=== Release files ==="
          ls -la release-files/

          # Generate latest.json
          REPO="goodnight000/tally"
          BASE_URL="https://github.com/$REPO/releases/download/v$VERSION"

          AARCH64_SIG=""
          if [ -f release-files/Tally_aarch64.app.tar.gz.sig ]; then
            AARCH64_SIG=$(cat release-files/Tally_aarch64.app.tar.gz.sig)
          fi

          X64_SIG=""
          if [ -f release-files/Tally_x64.app.tar.gz.sig ]; then
            X64_SIG=$(cat release-files/Tally_x64.app.tar.gz.sig)
          fi

          LINUX_SIG=""
          LINUX_APPIMAGE=$(find release-files -name "*.AppImage" -not -name "*.sig" | head -1)
          LINUX_SIG_FILE=$(find release-files -name "*.AppImage.sig" | head -1)
          if [ -n "$LINUX_SIG_FILE" ]; then
            LINUX_SIG=$(cat "$LINUX_SIG_FILE")
          fi
          LINUX_APPIMAGE_NAME=$(basename "$LINUX_APPIMAGE" 2>/dev/null || echo "")

          python3 -c "
          import json
          data = {
            'version': '$VERSION',
            'notes': 'Tally v$VERSION',
            'pub_date': '$(date -u +%Y-%m-%dT%H:%M:%SZ)',
            'platforms': {}
          }
          if '$AARCH64_SIG':
            data['platforms']['darwin-aarch64'] = {
              'signature': '$AARCH64_SIG',
              'url': '$BASE_URL/Tally_aarch64.app.tar.gz'
            }
          if '$X64_SIG':
            data['platforms']['darwin-x86_64'] = {
              'signature': '$X64_SIG',
              'url': '$BASE_URL/Tally_x64.app.tar.gz'
            }
          if '$LINUX_SIG' and '$LINUX_APPIMAGE_NAME':
            data['platforms']['linux-x86_64'] = {
              'signature': '$LINUX_SIG',
              'url': '$BASE_URL/$LINUX_APPIMAGE_NAME'
            }
          with open('release-files/latest.json', 'w') as f:
            json.dump(data, f, indent=2)
          "

          echo "=== latest.json ==="
          cat release-files/latest.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --repo goodnight000/tally \
            --title "Tally v$VERSION" \
            --notes "See the assets below to download and install this version." \
            release-files/*
